<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS:Objects and Arrays</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
     <pre id="out" class="">
    </pre>
    <button id="runBtn" class="px-3 py-1 border rounded mt-2 md-2 bg-black text-white">
        Run
    </button>
    <script>
        const out=document.getElementById("out");
        function print(...args){
            //Console
            console.log(...args);
            out.textContent+=args.join("")+"\n";
        }

        function clearOut(){
            out.textContent="";
        }
        
        function run(){
            clearOut();
            //dynamic typing concatination and type conversion
            let value="10";
            print("value =",value ,  "type of value=",typeof value);
              value=20;
            print("value =",value ,  "type of value=",typeof value);

            print("'10'+5=","10"+5);
            print("'10'-5=","10"-5);//numeric conversion
            print("'10'===10:","10"===10);

            //Datatypes
           const undefval =undefined;
           const nullval=null;
           print("undefval=",typeof undefval)
            print("nullval=",typeof nullval)
            print("10"!==10);
        }
        document.getElementById("runBtn").addEventListener("click",run);
    </script>
</body>
</html>
