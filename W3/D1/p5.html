<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS:Objects and Arrays</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
     <pre id="out" class="">
    </pre>
    <button id="runBtn" class="px-3 py-1 border rounded mt-2 md-2 bg-black text-white">
        Run
    </button>
    <script>
        const out=document.getElementById("out");
        function print(...args){
            //Console
            console.log(...args);
            out.textContent+=args.join("")+"\n";
        }

        function clearOut(){
            out.textContent="";
        }
        
        function run(){
            clearOut();
            const user={name:"jeevan",age:22};
            print("users=",JSON.stringify(user));//JSON always in key:value formate

            const array=[1,2,3,4,5,]
            array.push(5);
            print("IS itban array?",Array.isArray(array));
        }
        document.getElementById("runBtn").addEventListener("click",run);
    </script>
</body>
</html>
