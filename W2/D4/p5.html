    <main class="max-w-4xl mx-auto p-6 space-y-8">
        <section class="border rounded p-6 space-y-4">
            <div class="overflow-hidden rounded border ">
                <div id="track" class="flex transition-transform duration-300 ease-out  ">
                    <div
                        class="w-full shrink-0 h-52  flex items-center justify-center bg-[linear-gradient(#191970,#008080)] font-bold">
                        slide-1
                    </div>
                    <div
                        class="w-full shrink-0 h-52  flex items-center justify-center bg-[linear-gradient(#191970,#008080)] font-bold">
                        slide-2
                    </div>
                    <div
                        class="w-full shrink-0 h-52  flex items-center justify-center bg-[linear-gradient(#191970,#008080)] font-bold">
                        slide-3
                    </div>
                </div>
                <div class="flex justify-center gap-2 items-center ">
                    <button id="prev" class="px-3 py-2 rounded border hover:bg-blue-100 transition">
                        prev
                    </button>
                    <button id="next" class="px-3 py-2 rounded border hover:bg-[linear-gradient(#191970)]transition">
                        Next
                    </button>
                </div>
            </div>
        </section>
    </main>
    <script>
        const track = document.getElementById('track');
        const prev = document.getElementById('prev');
        const next = document.getElementById('next');
        let index = 0;
        const total = 3;
        function update() {
            track.style.transform = `translateX(-${index * 100}%)`;
        }
        prev.addEventListener('click', () => {
            index = (index - 1 + total) % total; update();
        });
        next.addEventListener('click', () => {
            index = (index + 1 + total) % total; update();
        });
        update();
    </script>
